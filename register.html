<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="glass-box register-box">
  <h2>注册</h2>
  <input type="text" id="user" placeholder="请输入账号">
  <input type="password" id="pwd" placeholder="请输入密码">
  <button onclick="register()">注册</button>
  <p class="link-text">已有账号？<span onclick="location.href='index.html'">去登录</span></p>
</div>

<script>
const DB = "https://chat-room-18a1c-default-rtdb.asia-southeast1.firebasedatabase.app/";

async function register() {
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pwd").value.trim();
  if (!u || !p) return alert("请输入账号密码");

  let res = await fetch(DB + "users.json");
  let data = await res.json();
  if (data) {
    for (let k in data) {
      if (data[k].user == u) {
        alert("账号已存在");
        return;
      }
    }
  }

  await fetch(DB + "users.json", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user: u, pwd: p, role: "user", ban: 0 })
  });
  alert("注册成功！请登录");
  location.href = "index.html";
}
</script>
</body>
</html>

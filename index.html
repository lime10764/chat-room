<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="noticeModal" class="modal">
  <div class="modal-glass">
    <h3>系统公告</h3>
    <div id="noticeText" class="notice-content">加载中...</div>
    <button onclick="closeNotice()">我已阅读</button>
  </div>
</div>

<div class="glass-box login-box">
  <h2>登录</h2>
  <input type="text" id="user" placeholder="请输入账号">
  <input type="password" id="pwd" placeholder="请输入密码">
  <button onclick="login()">登录</button>
  <p class="link-text">没有账号？<span onclick="location.href='register.html'">去注册</span></p>
</div>

<script>
const DB = "https://chat-room-18a1c-default-rtdb.asia-southeast1.firebasedatabase.app/";
const CDB = "https://chat-room-18a1c-40001-default-rtdb.asia-southeast1.firebasedatabase.app/";

window.onload = async () => {
  let res = await fetch(CDB + "notice.json");
  let data = await res.json();
  document.getElementById("noticeText").innerText = data?.content || "暂无公告";
};

function closeNotice() {
  document.getElementById("noticeModal").style.display = "none";
}

async function login() {
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pwd").value.trim();
  if (!u || !p) return alert("请输入账号密码");

  if (u === "WMJ" && p === "WMJYYDS") {
    localStorage.setItem("currentUser", JSON.stringify({ user: "WMJ", role: "admin" }));
    alert("管理员登录成功");
    location = "chat.html";
    return;
  }

  let res = await fetch(DB + "users.json");
  let data = await res.json();
  let find = null;
  for (let k in data) {
    if (data[k].user == u) {
      find = data[k];
      break;
    }
  }
  if (!find) return alert("账号不存在或已被删除");
  if (find.pwd != p) return alert("密码错误");
  localStorage.setItem("currentUser", JSON.stringify(find));
  location.href = "chat.html";
}
</script>
</body>
</html>

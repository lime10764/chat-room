<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <h2>登录</h2>
    <input type="text" id="login-user" placeholder="账号">
    <input type="password" id="login-pwd" placeholder="密码">
    <button onclick="login()">登录</button>

    <div class="divider"></div>

    <h2>注册</h2>
    <input type="text" id="reg-user" placeholder="账号">
    <input type="password" id="reg-pwd" placeholder="密码">
    <button onclick="register()">注册</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>

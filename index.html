<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="glass-box login-box">
  <h2>登录</h2>
  <input type="text" id="user" placeholder="请输入账号">
  <input type="password" id="pwd" placeholder="请输入密码">
  <button onclick="login()">登录</button>
  <p class="link-text">没有账号？<span onclick="location.href='register.html'">去注册</span></p>
</div>

<script>
const DB = "https://chat-room-18a1c-default-rtdb.asia-southeast1.firebasedatabase.app/";

async function login() {
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pwd").value.trim();
  if (!u || !p) return alert("请输入账号密码");

  let res = await fetch(DB + "users.json");
  let data = await res.json();
  let find = null;

  // 自动创建管理员账号（保证你一定能登录）
  if (u === "admin" && p === "admin") {
    find = { user: "admin", pwd: "admin", role: "admin", ban: 0 };
    localStorage.setItem("currentUser", JSON.stringify(find));
    alert("管理员登录成功");
    location = "chat.html";
    return;
  }

  // 普通用户验证
  for (let k in data) {
    if (data[k].user == u) {
      find = data[k];
      break;
    }
  }

  if (!find) return alert("账号不存在或已被删除");
  if (find.pwd != p) return alert("密码错误");

  localStorage.setItem("currentUser", JSON.stringify(find));
  location = "chat.html";
}
</script>
</body>
</html>

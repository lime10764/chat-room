<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>管理员后台</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .section {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 14px;
      margin: 20px 0;
    }
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      margin: 6px 0;
    }
    .danger {
      background: #ff4757;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <h1>管理员面板</h1>
    <button onclick="location.href='chat.html'">← 返回聊天大厅</button>

    <div class="section">
      <h2>用户管理</h2>
      <div id="userList"></div>
    </div>

    <div class="section">
      <h2>聊天记录管理</h2>
      <button onclick="clearAll()" class="danger">清空所有聊天记录</button>
      <div id="msgList"></div>
    </div>
  </div>

  <script>
    const FIREBASE_URL = "https://chat-room-18a1c-default-rtdb.asia-southeast1.firebasedatabase.app/";
    const currentUser = JSON.parse(localStorage.getItem("currentUser"));
    if (!currentUser || currentUser.user !== "admin") {
      alert("你没有管理员权限！");
      location.href = "index.html";
    }

    function loadUsers() {
      fetch(FIREBASE_URL + "users.json")
        .then(res => res.json())
        .then(users => {
          const box = document.getElementById("userList");
          box.innerHTML = "";
          for (let id in users) {
            const u = users[id];
            if (u.user === "admin") continue;
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <span>账号：${u.user}</span>
              <button class="danger" onclick="deleteUser('${id}')">删除用户</button>
            `;
            box.appendChild(div);
          }
        });
    }

    function deleteUser(id) {
      if (!confirm("确定删除此用户？")) return;
      fetch(FIREBASE_URL + "users/" + id + ".json", { method: "DELETE" })
        .then(() => loadUsers());
    }

    function loadMessages() {
      fetch(FIREBASE_URL + "messages.json")
        .then(res => res.json())
        .then(data => {
          const box = document.getElementById("msgList");
          box.innerHTML = "";
          for (let id in data) {
            const m = data[id];
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <span>${m.user}: ${m.text || m.name || "文件"}</span>
              <button class="danger" onclick="delMsg('${id}')">删除</button>
            `;
            box.appendChild(div);
          }
        });
    }

    function delMsg(id) {
      if (!confirm("确定删除这条消息？")) return;
      fetch(FIREBASE_URL + "messages/" + id + ".json", { method: "DELETE" })
        .then(() => loadMessages());
    }

    function clearAll() {
      if (!confirm("⚠️ 清空所有聊天记录？")) return;
      fetch(FIREBASE_URL + "messages.json", { method: "DELETE" })
        .then(() => loadMessages());
    }

    window.onload = function() {
      loadUsers();
      loadMessages();
    };
  </script>
</body>
</html>

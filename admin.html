<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>管理后台</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="glass-box">
  <h2>管理后台</h2>
  <h3>修改公告</h3>
  <textarea id="noticeContent" rows="4"></textarea>
  <button onclick="saveNotice()">保存公告</button>

  <h3>用户管理</h3>
  <div id="userList"></div>

  <br>
  <button onclick="location='chat.html'">返回聊天室</button>
</div>

<script>
const UDB = "https://chat-room-18a1c-default-rtdb.asia-southeast1.firebasedatabase.app/";
const CDB = "https://chat-room-18a1c-40001-default-rtdb.asia-southeast1.firebasedatabase.app/";

window.onload = async () => {
  let r = await fetch(CDB + "notice.json");
  let d = await r.json();
  document.getElementById("noticeContent").value = d?.content || "";
  loadUsers();
};

async function saveNotice() {
  let v = document.getElementById("noticeContent").value;
  await fetch(CDB + "notice.json", { method: "PUT", body: JSON.stringify({ content: v }) });
  alert("保存成功");
}

async function loadUsers() {
  let r = await fetch(UDB + "users.json");
  let d = await r.json();
  let box = document.getElementById("userList");
  box.innerHTML = "";
  for (let id in d) {
    let u = d[id];
    let div = document.createElement("div");
    div.className = "user-item";
    div.innerHTML = `
      ${u.user} ${u.role=="admin"?"[管理员]":""} ${u.ban==1?"[禁言]":""}
      <div>
        <button onclick="delUser('${id}')">删除</button>
        <button onclick="ban('${id}',${u.ban==1?0:1})">${u.ban==1?"解禁":"禁言"}</button>
      </div>
    `;
    box.appendChild(div);
  }
}

async function delUser(id) {
  if (!confirm("删除用户？")) return;
  await fetch(UDB + "users/" + id + ".json", { method: "DELETE" });
  loadUsers();
}

async function ban(id, val) {
  await fetch(UDB + "users/" + id + "/ban.json", { method: "PUT", body: val });
  loadUsers();
}
</script>
</body>
</html>

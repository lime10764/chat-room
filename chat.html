<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天大厅</title>
<link rel="stylesheet" href="style.css">
<style>
.media-img { max-width: 200px; border-radius: 8px; margin: 4px 0; }
.media-video { max-width: 300px; border-radius: 8px; margin: 4px 0; }

/* 公告弹窗样式 */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.modal-box {
  background: #222;
  color: #fff;
  padding: 24px;
  border-radius: 16px;
  width: 90%;
  max-width: 400px;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-box h2 { margin-top: 0; }
.modal-content {
  height: 200px;
  overflow-y: auto;
  background: #111;
  padding: 12px;
  border-radius: 8px;
  margin: 12px 0;
  font-size: 14px;
  line-height: 1.6;
}
#acceptBtn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.love-time {
  text-align: center;
  margin-top: 12px;
  color: #ff88aa;
  font-weight: bold;
}
</style>
</head>
<body>

<!-- 公告弹窗（必须看完才能进入） -->
<div class="modal-overlay" id="noticeModal">
  <div class="modal-box">
    <h2>📢 公告</h2>
    <div class="modal-content" id="noticeContent">
      欢迎来到我们的专属聊天室！<br><br>
      这是一个只属于我们两个人的小天地，希望我们能在这里记录下更多的日常与回忆。<br><br>
      💬 聊天规则：<br>
      1. 请文明聊天，可以发违规内容。<br>
      2. 消息、图片、视频请不要发服务器太小了，等服务器扩大了再说。<br>
      3. 管理员有权删除不当内容。<br><br>
      💕 愿我们的感情，长长久久，岁岁年年。<br>
      往下滑动看完，才能点击“我已阅读并同意”按钮。
    </div>

    <!-- 恋爱时长 -->
    <div class="love-time" id="loveTime">
      我们在一起：加载中...
    </div>

    <button id="acceptBtn" disabled onclick="closeNotice()">我已阅读并同意</button>
  </div>
</div>

<div class="chat-app" id="chatContent" style="display:none;">
  <div class="chat-header">
    <h2>我们的小天地 💬</h2>
    <div style="display:flex; gap:8px;">
      <button id="admin-btn" onclick="location.href='admin.html'" style="display:none;">管理员后台</button>
      <button onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="messages" id="msgBox"></div>

  <div class="toolbar">
    <input type="file" id="fileInput" style="display:none" accept="image/*,video/*">
    <button onclick="document.getElementById('fileInput').click()">📎 上传图片/视频</button>
    <button onclick="pickEmoji()">😀 表情</button>
  </div>

  <div class="input-box">
    <input type="text" id="msgInput" placeholder="输入消息...">
    <button onclick="sendMsg()">发送</button>
  </div>
</div>

<script src="app.js"></script>
<script>
const CHAT_DB = "https://chat-room-18a1c-40001-default-rtdb.asia-southeast1.firebasedatabase.app/";
let emoji = "";

// 公告滚动监听：必须看完才能点同意
const content = document.getElementById("noticeContent");
const acceptBtn = document.getElementById("acceptBtn");
content.addEventListener("scroll", () => {
  const isScrolledToBottom = content.scrollHeight - content.scrollTop <= content.clientHeight + 5;
  if (isScrolledToBottom) {
    acceptBtn.disabled = false;
  }
});

// 关闭公告
function closeNotice() {
  document.getElementById("noticeModal").style.display = "none";
  document.getElementById("chatContent").style.display = "block";
  renderMessages();
}

// 计算恋爱时长（从 2024-12-01 算起）
function updateLoveTime() {
  const startDate = new Date("2024-10-08");
  const now = new Date();
  const diffMs = now - startDate;

  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  const diffHours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const diffMinutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("loveTime").textContent = 
    `我们在一起：${diffDays} 天 ${diffHours} 小时 ${diffMinutes} 分钟`;
}
updateLoveTime();
setInterval(updateLoveTime, 60000); // 每分钟更新一次

// 聊天功能部分
function pickEmoji() {
  emoji = prompt("输入表情，比如 😀😂🥰😢😡");
}

function sendMsg() {
  const input = document.getElementById("msgInput");
  const text = (emoji + " " + input.value.trim()).trim();
  if (!text) return;

  fetch(CHAT_DB + "messages.json", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user: currentUser.user,
      text: text,
      type: "text",
      time: new Date().toLocaleString()
    })
  }).then(() => {
    input.value = "";
    emoji = "";
    renderMessages();
  });
}

document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  if (file.size > 5 * 1024 * 1024) {
    alert("文件太大了！请上传不超过5MB的图片或视频");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const fileType = file.type.startsWith("image") ? "image" : "video";
    fetch(CHAT_DB + "messages.json", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        user: currentUser.user,
        text: "",
        mediaUrl: e.target.result,
        type: fileType,
        time: new Date().toLocaleString()
      })
    }).then(() => renderMessages());
  };
  reader.readAsDataURL(file);
  this.value = "";
});

function renderMessages() {
  fetch(CHAT_DB + "messages.json")
    .then(res => res.json())
    .then(data => {
      const box = document.getElementById("msgBox");
      box.innerHTML = "";
      if (!data) return;
      for (let id in data) {
        const m = data[id];
        const div = document.createElement("div");
        div.className = "msg";
        let content = `<span class="user">${m.user}：</span>`;
        if (m.type === "text") {
          content += m.text;
        } else if (m.type === "image") {
          content += `<img src="${m.mediaUrl}" class="media-img" alt="图片">`;
        } else if (m.type === "video") {
          content += `<video controls class="media-video"><source src="${m.mediaUrl}" type="${m.mediaUrl}"></video>`;
        }
        content += `<br><small>${m.time}</small>`;
        div.innerHTML = content;
        box.appendChild(div);
      }
      box.scrollTop = box.scrollHeight;
    });
}

window.onload = function() {
  if (!currentUser) {
    location.href = "index.html";
    return;
  }
  if (currentUser.role === "admin") {
    document.getElementById("admin-btn").style.display = "inline-block";
  }
  // 聊天功能会在看完公告后才初始化
};
</script>
</body>
</html>

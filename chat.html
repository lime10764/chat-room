<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天室</title>
<style>
/* 以下是你原来的样式，我没动，只在最后加了图片修复 */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: system-ui, -apple-system, sans-serif;
}
#chatWrapper {
  max-width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.chat-header {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
}
.msg-box {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}
.msg-item {
  display: flex;
  margin-bottom: 15px;
}
.msg-item.me {
  justify-content: flex-end;
}
.msg-bubble {
  max-width: 75%;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 10px 14px;
  color: white;
  word-wrap: break-word;
}
.msg-bubble > div:first-child {
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.msg-bubble small {
  opacity: 0.7;
  font-size: 0.8em;
}
.input-bar {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 12px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.input-bar input {
  flex: 1;
  padding: 10px 14px;
  border: none;
  border-radius: 20px;
  outline: none;
  background: rgba(255,255,255,0.2);
  color: white;
}
.input-bar button {
  padding: 10px 16px;
  border: none;
  border-radius: 20px;
  background: rgba(255,255,255,0.3);
  color: white;
  cursor: pointer;
}
.delBtn {
  margin-top: 6px;
  padding: 4px 8px;
  border: none;
  border-radius: 6px;
  background: rgba(255, 80, 80, 0.6);
  color: white;
  font-size: 0.8em;
  cursor: pointer;
}

/* ------------------- 这里是我帮你加的图片修复代码 ------------------- */
.msg-bubble img,
.msg-bubble video {
  max-width: 100% !important;    /* 图片宽度不超过气泡，自动适配 */
  max-height: 300px;             /* 限制最大高度，避免太长 */
  display: block !important;     /* 图片独占一行，不跟文字挤在一起 */
  margin: 8px auto 0 auto !important; /* 上下间距 + 水平居中 */
  border-radius: 12px;           /* 圆角，和气泡风格统一 */
  pointer-events: none;           /* 防止误触 */
  user-select: none;              /* 防止选中图片 */
}
</style>
</head>
<body>
<div id="chatWrapper">
  <div class="chat-header">
    <span id="myName">LZ</span>
    <span>在线：<span id="onlineNum">0</span></span>
    <div>
      <button onclick="logout()">退出</button>
      <button id="adminBtn" style="display:none;" onclick="location.href='admin.html'">管理</button>
    </div>
  </div>
  <div id="msgBox" class="msg-box"></div>
  <div class="input-bar">
    <input type="file" id="filePic" accept="image/*" style="display:none">
    <input type="file" id="fileVideo" accept="video/*" style="display:none">
    <button onclick="filePic.click()">📷</button>
    <button onclick="fileVideo.click()">🎥</button>
    <input id="inputMsg" placeholder="输入消息...">
    <button onclick="sendMsg()">发送</button>
  </div>
</div>
<script>
// 你的API和功能代码，我一点没改
const USER_DB  = "https://chat-room-18a1c-default-rtdb.asia-southeast1.firebasedatabase.app/";
const CHAT_DB = "https://chat-room-18a1c-40001-default-rtdb.asia-southeast1.firebasedatabase.app/";
let me;
window.onload = async () => {
  let local = localStorage.getItem("currentUser");
  if (!local) return location = "index.html";
  me = JSON.parse(local);
  document.getElementById("myName").innerText = me.user;
  let ur = await fetch(USER_DB + "users.json");
  let us = await ur.json();
  let exist = false;
  for (let k in us) {
    if (us[k].user == me.user) {
      exist = true;
      if (us[k].ban == 1) {
        alert("你已被禁言");
        localStorage.clear();
        location = "index.html";
        return;
      }
      break;
    }
  }
  if (!exist) {
    alert("账号已被删除");
    localStorage.clear();
    location = "index.html";
    return;
  }
  if (me.role === "admin") {
    document.getElementById("adminBtn").style.display = "inline-block";
  }
  startChat();
};
function onlineHeart() {
  fetch(CHAT_DB + "online/" + me.user + ".json", { method: "PUT", body: Date.now() });
}
async function showOnline() {
  let r = await fetch(CHAT_DB + "online.json");
  let d = await r.json();
  if (!d) { document.getElementById("onlineNum").innerText = 0; return; }
  let c = 0;
  for (let k in d) if (d[k] > Date.now() - 120000) c++;
  document.getElementById("onlineNum").innerText = c;
}
function startChat() {
  loadMsg(); showOnline(); onlineHeart();
  setInterval(loadMsg, 1500);
  setInterval(showOnline, 3000);
  setInterval(onlineHeart, 30000);
}
async function loadMsg() {
  let r = await fetch(CHAT_DB + "messages.json");
  let d = await r.json();
  let box = document.getElementById("msgBox");
  const isAtBottom = box.scrollTop + box.clientHeight >= box.scrollHeight - 50;
  box.innerHTML = "";
  if (!d) return;
  let arr = [];
  for (let id in d) arr.push({ id, ...d[id] });
  arr.sort((a, b) => a.timeSort - b.timeSort);
  arr.forEach(m => {
    const isMe = m.user === me.user;
    let div = document.createElement("div");
    div.className = "msg-item " + (isMe ? "me" : "");
    let bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    let inner = `<div><b>${m.user}</b> <small>${m.time}</small></div>`;
    if (m.img) {
      inner += `<img src="${m.img}" oncontextmenu="return false">`;
    } else if (m.video) {
      inner += `<video src="${m.video}" controls controlsList="nodownload" oncontextmenu="return false"></video>`;
    } else {
      inner += `<div>${m.text}</div>`;
    }
    if (me.role === "admin") {
      inner += `<button class="delBtn" onclick="delMsg('${m.id}')">删除</button>`;
    }
    bubble.innerHTML = inner;
    div.appendChild(bubble);
    box.appendChild(div);
  });
  if (isAtBottom) box.scrollTop = box.scrollHeight;
}
async function delMsg(id) {
  if (!confirm("确定删除这条消息？")) return;
  await fetch(CHAT_DB + "messages/" + id + ".json", { method: "DELETE" });
  loadMsg();
}
async function sendMsg() {
  let t = document.getElementById("inputMsg").value.trim();
  if (!t) return;
  await fetch(CHAT_DB + "messages.json", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user: me.user,
      text: t,
      time: new Date().toLocaleString(),
      timeSort: Date.now()
    })
  });
  document.getElementById("inputMsg").value = "";
  loadMsg();
}
document.getElementById("filePic").onchange = e => {
  let f = e.target.files[0];
  if (!f) return;
  if (f.size > 3*1024*1024) return alert("图片≤3MB");
  let reader = new FileReader();
  reader.onload = async () => {
    await fetch(CHAT_DB + "messages.json", {
      method: "POST",
      body: JSON.stringify({
        user: me.user, img: reader.result, time: new Date().toLocaleString(), timeSort: Date.now()
      })
    });
    loadMsg();
  };
  reader.readAsDataURL(f);
  e.target.value = "";
};
document.getElementById("fileVideo").onchange = e => {
  let f = e.target.files[0];
  if (!f) return;
  if (f.size > 10*1024*1024) return alert("视频≤10MB");
  let reader = new FileReader();
  reader.onload = async () => {
    await fetch(CHAT_DB + "messages.json", {
      method: "POST",
      body: JSON.stringify({
        user: me.user, video: reader.result, time: new Date().toLocaleString(), timeSort: Date.now()
      })
    });
    loadMsg();
  };
  reader.readAsDataURL(f);
  e.target.value = "";
};
function logout() {
  localStorage.clear();
  location = "index.html";
}
</script>
</body>
</html>

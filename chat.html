<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天室</title>
<link rel="stylesheet" href="style.css">
<style>
img, video {
  pointer-events: none;
  user-select: none;
  max-width: 220px;
  border-radius: 10px;
  margin: 6px auto 0 auto; /* 上下6px，左右自动居中 */
  display: block; /* 图片独占一行，不会跟文字挤一起 */
}
.msg-item {
  display: flex;
  margin-bottom: 10px;
}
.msg-item.me {
  justify-content: flex-end;
}
.msg-bubble {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  word-wrap: break-word;
}
.msg-item.me .msg-bubble {
  background: rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<div id="chatWrapper">
  <div class="chat-header">
    <span>LZ</span>
    <span>在线：<span id="onlineNum">0</span></span>
    <div>
      <button onclick="logout()">退出</button>
      <button id="adminBtn" style="display:none;" onclick="location.href='admin.html'">管理</button>
    </div>
  </div>
  <div id="msgBox" class="msg-box"></div>
  <div class="input-bar">
    <input type="file" id="filePic" accept="image/*" style="display:none">
    <input type="file" id="fileVideo" accept="video/*" style="display:none">
    <button onclick="filePic.click()">📷</button>
    <button onclick="fileVideo.click()">🎥</button>
    <input id="inputMsg" placeholder="输入消息...">
    <button onclick="sendMsg()">发送</button>
  </div>
</div>
<script>
const USER_DB  = "https://chat-room-18a1c-default-rtdb.asia-southeast1.firebasedatabase.app/";
const CHAT_DB = "https://chat-room-18a1c-40001-default-rtdb.asia-southeast1.firebasedatabase.app/";
let me;
window.onload = async () => {
  let local = localStorage.getItem("currentUser");
  if (!local) return location = "index.html";
  me = JSON.parse(local);
  let ur = await fetch(USER_DB + "users.json");
  let us = await ur.json();
  let exist = false;
  for (let k in us) {
    if (us[k].user == me.user) {
      exist = true;
      if (us[k].ban == 1) {
        alert("你已被禁言");
        localStorage.clear();
        location = "index.html";
        return;
      }
      break;
    }
  }
  if (!exist) {
    alert("账号已被删除");
    localStorage.clear();
    location = "index.html";
    return;
  }
  if (me.role === "admin") {
    document.getElementById("adminBtn").style.display = "inline-block";
  }
  startChat();
};
function onlineHeart() {
  fetch(CHAT_DB + "online/" + me.user + ".json", { method: "PUT", body: Date.now() });
}
async function showOnline() {
  let r = await fetch(CHAT_DB + "online.json");
  let d = await r.json();
  if (!d) { document.getElementById("onlineNum").innerText = 0; return; }
  let c = 0;
  for (let k in d) if (d[k] > Date.now() - 120000) c++;
  document.getElementById("onlineNum").innerText = c;
}
function startChat() {
  loadMsg(); showOnline(); onlineHeart();
  setInterval(loadMsg, 1500);
  setInterval(showOnline, 3000);
  setInterval(onlineHeart, 30000);
}
async function loadMsg() {
  let r = await fetch(CHAT_DB + "messages.json");
  let d = await r.json();
  let box = document.getElementById("msgBox");
  const isAtBottom = box.scrollTop + box.clientHeight >= box.scrollHeight - 50;
  box.innerHTML = "";
  if (!d) return;
  let arr = [];
  for (let id in d) arr.push({ id, ...d[id] });
  arr.sort((a, b) => a.timeSort - b.timeSort);
  arr.forEach(m => {
    const isMe = m.user === me.user;
    let div = document.createElement("div");
    div.className = "msg-item " + (isMe ? "me" : "");
    let bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    let inner = `<div><b>${m.user}</b> <small>${m.time}</small></div>`;
    if (m.img) {
      inner += `<img src="${m.img}" oncontextmenu="return false">`;
    } else if (m.video) {
      inner += `<video src="${m.video}" controls controlsList="nodownload" oncontextmenu="return false"></video>`;
    } else {
      inner += `<div>${m.text}</div>`;
    }
    if (me.role === "admin") {
      inner += `<button class="delBtn" onclick="delMsg('${m.id}')">删除</button>`;
    }
    bubble.innerHTML = inner;
    div.appendChild(bubble);
    box.appendChild(div);
  });
  if (isAtBottom) box.scrollTop = box.scrollHeight;
}
async function delMsg(id) {
  if (!confirm("确定删除这条消息？")) return;
  await fetch(CHAT_DB + "messages/" + id + ".json", { method: "DELETE" });
  loadMsg();
}
async function sendMsg() {
  let t = document.getElementById("inputMsg").value.trim();
  if (!t) return;
  await fetch(CHAT_DB + "messages.json", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user: me.user,
      text: t,
      time: new Date().toLocaleString(),
      timeSort: Date.now()
    })
  });
  document.getElementById("inputMsg").value = "";
  loadMsg();
}
document.getElementById("filePic").onchange = e => {
  let f = e.target.files[0];
  if (!f) return;
  if (f.size > 3*1024*1024) return alert("图片≤3MB");
  let reader = new FileReader();
  reader.onload = async () => {
    await fetch(CHAT_DB + "messages.json", {
      method: "POST",
      body: JSON.stringify({
        user: me.user, img: reader.result, time: new Date().toLocaleString(), timeSort: Date.now()
      })
    });
    loadMsg();
  };
  reader.readAsDataURL(f);
  e.target.value = "";
};
document.getElementById("fileVideo").onchange = e => {
  let f = e.target.files[0];
  if (!f) return;
  if (f.size > 10*1024*1024) return alert("视频≤10MB");
  let reader = new FileReader();
  reader.onload = async () => {
    await fetch(CHAT_DB + "messages.json", {
      method: "POST",
      body: JSON.stringify({
        user: me.user, video: reader.result, time: new Date().toLocaleString(), timeSort: Date.now()
      })
    });
    loadMsg();
  };
  reader.readAsDataURL(f);
  e.target.value = "";
};
function logout() {
  localStorage.clear();
  location = "index.html";
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天大厅</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="chat-app">
  <div class="chat-header">
    <h2>公共聊天大厅</h2>
    <button id="admin-btn" onclick="goAdmin()" style="display:none;">管理员后台</button>
    <button onclick="logout()">退出登录</button>
  </div>

  <div class="messages" id="msgBox"></div>

  <div class="toolbar">
    <input type="file" id="fileInput" style="display:none">
    <button onclick="document.getElementById('fileInput').click()">📎 上传文件</button>
    <button onclick="pickEmoji()">😀 表情</button>
  </div>

  <div class="input-box">
    <input type="text" id="msgInput" placeholder="输入消息...">
    <button onclick="sendMsg()">发送</button>
  </div>
</div>

<script src="app.js"></script>
<script>
const FIREBASE_URL = "https://chat-room-18a1c-default-rtdb.asia-southeast1.firebasedatabase.app/";
let emoji = "";

function pickEmoji() {
  emoji = prompt("输入表情：😀😂🥰😢😡");
}

function sendMsg() {
  const input = document.getElementById("msgInput");
  const text = (emoji + " " + input.value.trim()).trim();
  if (!text) return;

  fetch(FIREBASE_URL + "messages.json", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user: currentUser.user,
      text: text,
      time: new Date().toLocaleString()
    })
  }).then(() => {
    input.value = "";
    emoji = "";
    renderMessages();
  });
}

function renderMessages() {
  fetch(FIREBASE_URL + "messages.json")
    .then(res => res.json())
    .then(data => {
      const box = document.getElementById("msgBox");
      box.innerHTML = "";
      if (!data) return;
      for (let id in data) {
        const m = data[id];
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<span class="user">${m.user}：</span>${m.text}<br><small>${m.time}</small>`;
        box.appendChild(div);
      }
      box.scrollTop = box.scrollHeight;
    });
}

window.onload = function() {
  if (!currentUser) {
    location.href = "index.html";
    return;
  }
  if (currentUser.role === "admin") {
    document.getElementById("admin-btn").style.display = "inline-block";
  }
  renderMessages();
  setInterval(renderMessages, 2000);
};
</script>
</body>
</html>

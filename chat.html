<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天室</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 必须看完的公告 -->
<div id="noticeModal" class="modal">
  <div class="modal-body">
    <h3>📢 公告</h3>
    <div id="noticeText" class="notice-content"></div>
    <div class="love-text" id="loveTime"></div>
    <button id="agreeBtn" disabled>我已阅读并同意</button>
  </div>
</div>

<div id="chatWrapper" style="display:none;">
<div class="header">
  <span id="roomTitle">我们的小天地</span>
  <span>在线：<span id="onlineNum">0</span></span>
  <div>
    <button onclick="logout()">退出登录</button>
    <button id="adminBtn" style="display:none;" onclick="location='admin.html'">管理后台</button>
  </div>
</div>

<div id="msgBox"></div>

<div class="input-bar">
  <input type="file" id="filePic" accept="image/*" style="display:none">
  <button onclick="filePic.click()">📷</button>
  <input id="inputMsg" placeholder="输入消息...">
  <button onclick="sendMsg()">发送</button>
</div>
</div>

<script>
const USER_DB  = "https://chat-room-18a1c-default-rtdb.asia-southeast1.firebasedatabase.app/";
const CHAT_DB = "https://chat-room-18a1c-40001-default-rtdb.asia-southeast1.firebasedatabase.app/";
let me;

window.onload = async () => {
  let local = localStorage.getItem("u");
  if(!local) return location = "index.html";
  me = JSON.parse(local);

  // 校验账号是否被删
  let ur = await fetch(USER_DB + "users.json");
  let us = await ur.json();
  let exist = false;
  for(let k in us){
    if(us[k].user == me.user){
      exist = true;
      if(us[k].ban == 1){
        alert("你已被禁言");
        localStorage.clear();
        location = "index.html";
        return;
      }
      break;
    }
  }
  if(!exist){
    alert("账号已被管理员删除");
    localStorage.clear();
    location = "index.html";
    return;
  }

  if(me.role === "admin"){
    document.getElementById("adminBtn").style.display = "inline-block";
  }

  loadNotice();
  startLoveCount();
  onlineHeart();
  setInterval(onlineHeart, 30000);
};

// 公告必须滑到底才能同意
function checkNoticeScroll(){
  let el = document.getElementById("noticeText");
  let btn = document.getElementById("agreeBtn");
  el.onscroll = () => {
    if(el.scrollHeight - el.scrollTop <= el.clientHeight + 5){
      btn.disabled = false;
      btn.onclick = () => {
        document.getElementById("noticeModal").style.display = "none";
        document.getElementById("chatWrapper").style.display = "block";
        startChat();
      }
    }
  }
}

// 加载公告
async function loadNotice(){
  let r = await fetch(CHAT_DB + "notice.json");
  let d = await r.json();
  let txt = d?.content || "欢迎来到聊天室～";
  document.getElementById("noticeText").innerHTML = txt.replace(/\n/g,"<br>");
  checkNoticeScroll();
}

// 恋爱时长 2024-10-08
function startLoveCount(){
  function update(){
    let s = new Date("2024-10-08");
    let now = new Date();
    let ms = now - s;
    let day = Math.floor(ms / 86400000);
    let h = Math.floor((ms % 86400000) / 3600000);
    let m = Math.floor((ms % 3600000) / 60000);
    document.getElementById("loveTime").innerText = `我们相爱：${day}天 ${h}时 ${m}分`;
  }
  update();
  setInterval(update, 60000);
}

// 在线人数
async function showOnline(){
  let r = await fetch(CHAT_DB + "online.json");
  let d = await r.json();
  if(!d){
    document.getElementById("onlineNum").innerText = 0;
    return;
  }
  let limit = Date.now() - 120000;
  let c = 0;
  for(let k in d){
    if(d[k] > limit) c++;
  }
  document.getElementById("onlineNum").innerText = c;
}

function onlineHeart(){
  fetch(CHAT_DB + "online/"+me.user+".json", {
    method:"PUT",
    body:Date.now()
  });
}

// 聊天
function startChat(){
  loadMsg();
  showOnline();
  setInterval(loadMsg, 1500);
  setInterval(showOnline, 3000);
}

async function loadMsg(){
  let r = await fetch(CHAT_DB + "messages.json");
  let d = await r.json();
  let box = document.getElementById("msgBox");
  box.innerHTML = "";
  if(!d) return;
  let arr = [];
  for(let id in d) arr.push({id, ...d[id]});
  arr.sort((a,b)=>a.timeSort - b.timeSort);
  arr.forEach(m => {
    let div = document.createElement("div");
    div.className = "msg-item";
    let html = `<div><b>${m.user}</b> <small>${m.time}</small></div>`;
    if(m.img){
      html += `<img src="${m.img}" class="msg-img">`;
    }else{
      html += `<div>${m.text}</div>`;
    }
    if(me.role === "admin"){
      html += `<button class="del-msg-btn" onclick="delOneMsg('${m.id}')">删除</button>`;
    }
    div.innerHTML = html;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

// 只能一条一条删，没有一键清空
async function delOneMsg(id){
  if(!confirm("确定删除这条消息？")) return;
  await fetch(CHAT_DB + "messages/"+id+".json", { method:"DELETE" });
  loadMsg();
}

async function sendMsg(){
  let t = document.getElementById("inputMsg").value.trim();
  if(!t) return;
  await fetch(CHAT_DB + "messages.json",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user:me.user,
      text:t,
      time:new Date().toLocaleString(),
      timeSort:Date.now()
    })
  });
  document.getElementById("inputMsg").value = "";
  loadMsg();
}

document.getElementById("filePic").onchange = e => {
  let f = e.target.files[0];
  if(!f) return;
  if(f.size > 3*1024*1024) return alert("图片≤3MB");
  let reader = new FileReader();
  reader.onload = async ()=>{
    await fetch(CHAT_DB + "messages.json",{
      method:"POST",
      body:JSON.stringify({
        user:me.user,
        img:reader.result,
        time:new Date().toLocaleString(),
        timeSort:Date.now()
      })
    });
    loadMsg();
  };
  reader.readAsDataURL(f);
  e.target.value = "";
};

function logout(){
  localStorage.clear();
  location = "index.html";
}
</script>
</body>
</html>

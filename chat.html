<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天大厅</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .messages {
      height: 60vh;
      overflow-y: auto;
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 14px;
      margin-bottom: 15px;
    }
    .msg {
      margin: 10px 0;
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    .msg .user {
      font-weight: bold;
      color: #7c6fff;
    }
  </style>
</head>
<body>
  <div class="chat-app">
    <div class="chat-header">
      <h2>公共聊天大厅</h2>
      <button id="admin-btn" onclick="goAdmin()" style="display:none;">管理员后台</button>
      <button onclick="logout()">退出登录</button>
    </div>

    <div class="messages" id="msgBox"></div>

    <div class="toolbar">
      <input type="file" id="fileInput" style="display:none">
      <button onclick="document.getElementById('fileInput').click()">📎 上传文件</button>
      <button onclick="pickEmoji()">😀 表情</button>
    </div>

    <div class="input-box">
      <input type="text" id="msgInput" placeholder="输入消息...">
      <button onclick="sendMsg()">发送</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const FIREBASE_URL = "https://chat-room-18a1c-default-rtdb.asia-southeast1.firebasedatabase.app/";
    let emoji = "";

    function pickEmoji() {
      emoji = prompt("输入表情符号，比如 😀、😂");
    }

    function sendMsg() {
      const input = document.getElementById("msgInput");
      const text = (emoji + " " + input.value.trim()).trim();
      if (!text) return;

      fetch(FIREBASE_URL + "messages.json", {
        method: "POST",
        body: JSON.stringify({
          user: currentUser.user,
          text: text,
          time: new Date().toLocaleString()
        })
      }).then(() => {
        input.value = "";
        emoji = "";
      });
    }

    function sendFile() {
      const file = document.getElementById("fileInput").files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        fetch(FIREBASE_URL + "messages.json", {
          method: "POST",
          body: JSON.stringify({
            user: currentUser.user,
            type: "file",
            name: file.name,
            data: e.target.result,
            time: new Date().toLocaleString()
          })
        });
      };
      reader.readAsDataURL(file);
    }

    function renderMessages() {
      fetch(FIREBASE_URL + "messages.json")
        .then(res => res.json())
        .then(data => {
          const box = document.getElementById("msgBox");
          box.innerHTML = "";
          for (let id in data) {
            const m = data[id];
            const div = document.createElement("div");
            div.className = "msg";
            if (m.type === "file") {
              if (m.name.match(/\.(jpg|png|gif|webp)$/i)) {
                div.innerHTML = `<span class="user">${m.user}:</span><br><img src="${m.data}" style="max-width:200px; border-radius:8px;"><br><small>${m.time}</small>`;
              } else if (m.name.match(/\.(mp4|webm)$/i)) {
                div.innerHTML = `<span class="user">${m.user}:</span><br><video controls src="${m.data}" style="max-width:200px; border-radius:8px;"></video><br><small>${m.time}</small>`;
              } else {
                div.innerHTML = `<span class="user">${m.user}:</span><br><a href="${m.data}" download="${m.name}">下载文件：${m.name}</a><br><small>${m.time}</small>`;
              }
            } else {
              div.innerHTML = `<span class="user">${m.user}:</span> ${m.text}<br><small>${m.time}</small>`;
            }
            box.appendChild(div);
          }
          box.scrollTop = box.scrollHeight;
        });
    }

    // 页面加载时初始化
    window.onload = function() {
      if (!currentUser) {
        location.href = "index.html";
        return;
      }
      if (currentUser.role === "admin") {
        document.getElementById("admin-btn").style.display = "inline-block";
      }
      renderMessages();
      document.getElementById("fileInput").addEventListener("change", sendFile);
      // 每 2 秒自动刷新消息，实现实时效果
      setInterval(renderMessages, 2000);
    };
  </script>
</body>
</html>
